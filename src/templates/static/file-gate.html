<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>KEY REQUIRED // ARCHIFICATION</title>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&family=Share+Tech+Mono&family=Rajdhani:wght@400;500&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #02030a;
      min-height: 100vh;
      display: flex; align-items: center; justify-content: center;
      font-family: 'Rajdhani', sans-serif;
      color: #7a9cc0;
    }

    body::before {
      content: '';
      position: fixed; inset: 0;
      background-image:
        linear-gradient(rgba(0,229,255,0.022) 1px, transparent 1px),
        linear-gradient(90deg, rgba(0,229,255,0.022) 1px, transparent 1px);
      background-size: 44px 44px;
      pointer-events: none; z-index: 0;
    }

    body::after {
      content: '';
      position: fixed; inset: 0;
      background: repeating-linear-gradient(
        0deg, transparent, transparent 3px,
        rgba(0,0,0,0.07) 3px, rgba(0,0,0,0.07) 4px
      );
      pointer-events: none; z-index: 999;
    }

    .card {
      background: #0c0f1e;
      border: 1px solid rgba(0,229,255,0.12);
      box-shadow: 6px 6px 14px rgba(2,3,9,0.92), -4px -4px 10px rgba(0,229,255,0.055);
      padding: 2.75rem 2.5rem;
      width: 90%; max-width: 420px;
      position: relative; text-align: center; z-index: 10;
      animation: cardIn 0.4s ease both;
    }
    @keyframes cardIn {
      from { opacity: 0; transform: translateY(16px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .card::before {
      content: '';
      position: absolute; top: -1px; left: -1px;
      width: 22px; height: 22px;
      border-top: 2px solid #00e5ff; border-left: 2px solid #00e5ff;
      box-shadow: -1px -1px 10px rgba(0,229,255,0.3);
    }
    .card::after {
      content: '';
      position: absolute; bottom: -1px; right: -1px;
      width: 22px; height: 22px;
      border-bottom: 2px solid #00e5ff; border-right: 2px solid #00e5ff;
      box-shadow: 1px 1px 10px rgba(0,229,255,0.3);
    }

    .logo {
      font-family: 'Orbitron', monospace;
      font-size: 1.05rem; font-weight: 900;
      letter-spacing: 0.22em; text-transform: uppercase;
      color: #00e5ff;
      text-shadow: 0 0 8px #00e5ff, 0 0 22px rgba(0,229,255,0.28);
      margin-bottom: 0.3rem;
    }
    .logo-bracket { color: #00ff41; text-shadow: 0 0 8px #00ff41, 0 0 22px rgba(0,255,65,0.28); }

    .eyebrow {
      font-family: 'Share Tech Mono', monospace;
      font-size: 0.55rem; letter-spacing: 0.3em;
      text-transform: uppercase; color: #243450;
      margin-bottom: 1.75rem;
    }

    .divider {
      height: 1px;
      background: linear-gradient(90deg, transparent, rgba(0,229,255,0.18), transparent);
      margin-bottom: 1.75rem;
    }

    .auth-title {
      font-family: 'Orbitron', monospace;
      font-size: 0.82rem; font-weight: 700;
      letter-spacing: 0.1em; text-transform: uppercase;
      color: #e8f4ff; margin-bottom: 0.65rem;
    }

    .auth-sub {
      font-size: 0.92rem; color: #7a9cc0;
      line-height: 1.65; margin-bottom: 1.75rem;
    }

    .error-msg {
      font-family: 'Share Tech Mono', monospace;
      font-size: 0.72rem; letter-spacing: 0.12em;
      color: #ff4040;
      text-shadow: 0 0 8px rgba(255,64,64,0.5);
      padding: 0.6rem 1rem;
      border: 1px solid rgba(255,64,64,0.25);
      background: rgba(255,64,64,0.06);
      margin-bottom: 1.25rem;
      animation: glitch 0.3s ease;
    }
    @keyframes glitch {
      0%   { transform: translateX(0); }
      20%  { transform: translateX(-3px); }
      40%  { transform: translateX(3px); }
      60%  { transform: translateX(-2px); }
      80%  { transform: translateX(2px); }
      100% { transform: translateX(0); }
    }

    .upload-zone {
      position: relative;
      margin-bottom: 1.25rem;
    }
    .upload-label {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0.6rem;
      padding: 1.6rem 1rem;
      border: 1px dashed rgba(0,229,255,0.22);
      background: rgba(0,229,255,0.025);
      cursor: pointer;
      transition: border-color 0.22s, background 0.22s;
    }
    .upload-label:hover {
      border-color: rgba(0,229,255,0.42);
      background: rgba(0,229,255,0.055);
    }
    .upload-label .u-icon {
      font-size: 1.7rem; line-height: 1;
    }
    .upload-label .u-text {
      font-family: 'Share Tech Mono', monospace;
      font-size: 0.65rem; letter-spacing: 0.18em;
      text-transform: uppercase; color: #00e5ff;
    }
    .upload-label .u-sub {
      font-size: 0.75rem; color: #2e4460; letter-spacing: 0.04em;
    }
    #filename-display {
      font-family: 'Share Tech Mono', monospace;
      font-size: 0.68rem; color: #00ff41;
      text-shadow: 0 0 6px rgba(0,255,65,0.4);
      margin-top: 0.55rem;
      min-height: 1.3em;
      letter-spacing: 0.06em;
      word-break: break-all;
    }
    input[type="file"] {
      position: absolute; inset: 0;
      opacity: 0; cursor: pointer; width: 100%; height: 100%;
    }

    .btn-submit {
      display: block; width: 100%;
      padding: 0.72rem 1.5rem;
      background: #0c0f1e;
      border: 1px solid rgba(0,229,255,0.2);
      box-shadow: 4px 4px 10px rgba(2,3,9,0.9), -2px -2px 6px rgba(0,229,255,0.06);
      color: #e8f4ff;
      font-family: 'Share Tech Mono', monospace;
      font-size: 0.62rem; letter-spacing: 0.18em; text-transform: uppercase;
      cursor: pointer; transition: all 0.22s;
    }
    .btn-submit:hover:not(:disabled) {
      border-color: rgba(0,229,255,0.4); color: #fff;
      text-shadow: 0 0 8px #00e5ff, 0 0 22px rgba(0,229,255,0.28);
      box-shadow: 6px 6px 14px rgba(2,3,9,0.95), -3px -3px 8px rgba(0,229,255,0.09);
    }
    .btn-submit:disabled {
      opacity: 0.35; cursor: not-allowed;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo"><span class="logo-bracket">[ </span>ARCHIFICATION<span class="logo-bracket"> ]</span></div>
    <div class="eyebrow">// KEY VERIFICATION TERMINAL</div>
    <div class="divider"></div>
    <p class="auth-title">KEY FILE REQUIRED</p>

    {% if error %}
    <div class="error-msg">ERR :: INVALID KEY — ACCESS DENIED</div>
    {% endif %}

    <p class="auth-sub">Upload the authentication key file to unlock access to this resource.</p>

    <form action="/auth/file-gate?next={{ next | urlencode }}" method="post" enctype="multipart/form-data">
      <div class="upload-zone">
        <label class="upload-label" for="key_file">
          <span class="u-icon">🔑</span>
          <span class="u-text">SELECT KEY FILE</span>
          <span class="u-sub">Click or drag file here</span>
        </label>
        <input type="file" name="key_file" id="key_file" required>
      </div>
      <div id="filename-display"></div>
      <button type="submit" class="btn-submit" id="submit-btn" disabled>AUTHENTICATE</button>
    </form>
  </div>

  <script>
    var fileInput = document.getElementById('key_file');
    var display   = document.getElementById('filename-display');
    var submitBtn = document.getElementById('submit-btn');
    fileInput.addEventListener('change', function () {
      if (fileInput.files.length > 0) {
        display.textContent = '> ' + fileInput.files[0].name;
        submitBtn.disabled = false;
      } else {
        display.textContent = '';
        submitBtn.disabled = true;
      }
    });
  </script>
</body>
</html>
